<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css.css">
    <title>Document</title>
</head>
<body>
    <div class="blackLine"></div>
    <div class="desk">
        <div class="iconContainer">

            <div class="iconUnit">
                <div class="icon iconOne"></div>
                <div class="icon_text">Portfolio</div>
            </div>

            <div class="iconUnit">
                <div class="icon iconTwo"></div>
                <div class="icon_text">Something_else</div>
            </div>

            <div class="iconUnit">
                <div class="icon iconThree"></div>
                <div class="icon_text">Library</div>
            </div>

        </div>



        <div class="window portfolio" data-name="Portfolio">
            <div class="controls">
                <div class="closeBtn"></div>
            </div>
            <div class="windowContent">
                <embed src="Lebenslauf.pdf" width="100%" height="100%" />
            </div>
        </div>

        <div class="window elseWindow" data-name="Something_else">
            <div class="controls">
                <div class="closeBtn"></div>
            </div>
        </div>

    </div>



    <script src="./js.js"></script>

</html>
